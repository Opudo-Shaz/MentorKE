<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
        }
        .header { font-size: 20px; font-weight: bold; color: #333; }
        .content { margin-top: 15px; font-size: 14px; color: #555; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Welcome to MentorKE</div>
    <div class="content">
        <p>Hi {{name}},</p>
        <p>Your account has been successfully created as a <b>{{role}}</b>.</p>
        <p>We’re excited to have you on board.</p>
    </div>
    <div class="footer">
        © MentorKE Team
    </div>
</div>
</body>
</html>
